name = "trace-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "trace-sessions"
database_id = "YOUR_D1_DATABASE_ID"

[ai]
binding = "AI"

[[rules]]
type = "Data"
globs = ["**/*.wasm"]
fallthrough = true
